services:
  postgres:
    image: postgres:16-alpine
    container_name: rpms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpms_user
      POSTGRES_PASSWORD: rpms_pass
      POSTGRES_DB: rpms_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpms_user -d rpms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rpms_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
